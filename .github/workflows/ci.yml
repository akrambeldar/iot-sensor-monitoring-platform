name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Show files
        run: |
          pwd
          ls -la
          ls -la ../
          ls -la ./

      - name: Install dependencies
        run: npm ci

      - name: Verify Jest is available
        run: npx jest --version

      - name: Run tests
        run: npm test