version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: iot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iot_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: iot_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 5000
      DB_NAME: iot_monitoring
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: iot_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  simulator:
    build: ./sensor-simulator
    container_name: iot_simulator
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: http://backend:5000/api/sensors
    volumes:
      - ./sensor-simulator:/app

volumes:
  postgres_data: